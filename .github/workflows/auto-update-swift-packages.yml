name: Auto Update Swift Packages

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-packages:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make updater executable
        run: chmod +x ./update_all_packages.sh

      - name: Update all packages
        run: ./update_all_packages.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-update Swift package versions"
          title: "chore: auto-update Swift package versions"
          body: |
            Automated update of Xcode Swift Package dependencies.

            - Source: `update_all_packages.sh`
            - Updated file: `NoteWall.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved`
          branch: chore/auto-update-swift-packages
          delete-branch: true
          add-paths: |
            NoteWall.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
